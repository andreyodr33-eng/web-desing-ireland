<!Doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json"/>
    <link rel="apple-touch-icon" href="icon-180.png">
    <title>English Trainer</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin: 0;
        padding: 20px;
      }
       html, body {
         height: 100%;
         overflow: hidden;
      }
      
      .top {
        text-align: center;
        margin-bottom: 15px;
      }
      select {
        font-size: 18px;
        padding: 8px;
      }

      .stats {
        font-size: 13px;
        opacity:0.8;
        white-space:nowrap;
      }
      .game {
         max-width: 900px;
         margin: auto;

         height: calc(100vh - 140px);

        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .column {
        display: flex;
        flex-direction: column;
        gap: 10px;

        overflow-y: auto;
        padding-right: 5px;
     }
      
      .card {
        min-height: 50px;
        padding: 10px;

        display: flex;
        align-items: center;
        justify-content: center;

        font-size: 20px;

        background: white;
        border: 2px solid #ccc;
        border-radius: 10px;

        cursor: pointer;

        word-break: break-word;
     }
      
      .card:hover {
        border-color: #2196F3;
        box-shadow: 0 3px 10px rgba(0,0,0,0.15);
     }
      
     .card:active {
         transform: scale(0.98);
         box-shadow: 0 2px 6px rgba(0,0,0,0.15);
     }

      .selected {
        border-color: #2196f3;
      }

      .correct {
        background: #4caf50;
        color: white;
        border-color: #4caf50;
      }

      .wrong {
        background: #f44336;
        color: white;
        border-color: #f44336;
      }
       .message {
        text-align: center;
        font-size: 24px;
        margin: 20px;
        height: 30px;
        
      }
      
      #modeBtn {
        font-size: 14px;
        padding: 6px 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .column::-webkit-scrollbar {
         width: 6px;
      }

      .column::-webkit-scrollbar-thumb {
          background: #ccc;
          border-radius: 10px;
      }

      

     .game {
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:10px;
    }


    </style>
   <body>
    <div class="top">
      <button id="modeBtn">👂</button>
      <div class="stats">
        Цикл: <span id="cycle">1</span> | Изучено: <span id="progress">0</span>
      
    <div class="message" id="message"></div> 
    </div>

    

    <div class="game">
      <div class="column" id="leftColumn"></div>
      <div class="column" id="rightColumn"></div>
    </div>

    <script>

];

      const WORDS_PER_ROUND = 5;

      let pool = [];
      let currentIndex = 0;
      let cycle = 1;
      let currentMode = "audio";
      let currentWords = [];

      let selectedLeft = null;
      let selectedRight = null;

      let solvedPairs = 0;

      function shuffle(arr) {
        return [...arr].sort(() => Math.random() - 0.5);
      }

      function createCycle() {
        pool = shuffle(WORDS);
        currentIndex = 0;
      }

      function getNextWords() {
        if (currentIndex + WORDS_PER_ROUND > pool.length) {
          cycle++;
          document.getElementById("cycle").textContent = cycle;

          createCycle();
        }

        const result = pool.slice(currentIndex, currentIndex + WORDS_PER_ROUND);

        currentIndex += WORDS_PER_ROUND;

        return result;
      }
   function speak(text){
    const utterance = new SpeechSynthesisUtterance(text);

    utterance.lang = "en-US";
    utterance.rate = 0.9;
    const voices = speechSynthesis.getVoices();

     const englishVoice = voices.find(v =>
        v.lang.includes("en")
    );

    if(englishVoice){
        utterance.voice = englishVoice;
    }


    speechSynthesis.speak(utterance);
}
      

      function startRound() {
        document.getElementById("message").textContent = "";

        selectedLeft = null;
        selectedRight = null;
        solvedPairs = 0;

        currentWords = getNextWords();

        document.getElementById("progress").textContent =
          `${Math.min(currentIndex, WORDS.length)} / ${WORDS.length}`;

        renderBoard();
      }

      function renderBoard() {
        const mode = currentMode;

        const left = document.getElementById("leftColumn");

        const right = document.getElementById("rightColumn");

        left.innerHTML = "";
        right.innerHTML = "";

        let leftWords = [];
        let rightWords = [];

        if (mode === "audio") {
          leftWords = currentWords;

          rightWords = shuffle([...currentWords]);
        }

        if (mode === "visual") {
          leftWords = currentWords;

          rightWords = shuffle([...currentWords]);
        }

        if (mode === "reverse") {
          leftWords = currentWords;

          rightWords = shuffle([...currentWords]);
        }

        leftWords.forEach((word) => {
          const card = document.createElement("div");

          card.className = "card";

          if (mode === "reverse") {
            card.textContent = word.en;
          } else {
            card.textContent = word.ru;
          }

          card.dataset.id = word.id;
          card.dataset.en = word.en;

          card.onclick = () => selectLeft(card);

          left.appendChild(card);
        });

        rightWords.forEach((word) => {
          const card = document.createElement("div");

          card.className = "card";

          if (mode === "audio") {
            card.textContent = "🔊";
          }

          if (mode === "visual") {
            card.textContent = word.en;
          }

          if (mode === "reverse") {
            card.textContent = word.ru;
          }

          card.dataset.id = word.id;
          card.dataset.en = word.en;

          card.onclick = () => selectRight(card);

          right.appendChild(card);
        });
      }

      function selectLeft(card) {
        if (card.classList.contains("correct")) return;
        const mode = currentMode;

        if (mode === "reverse") {
          speak(card.dataset.en);
        }
        document
          .querySelectorAll("#leftColumn .selected")
          .forEach((c) => c.classList.remove("selected"));

        selectedLeft = card;

        card.classList.add("selected");

        checkMatch();
      }

      function selectRight(card) {
        if (card.classList.contains("correct")) return;

        const mode = currentMode;

        if (mode !== "reverse") {
          speak(card.dataset.en);
        }

        document
          .querySelectorAll("#rightColumn .selected")
          .forEach((c) => c.classList.remove("selected"));

        selectedRight = card;

        card.classList.add("selected");

        checkMatch();
      }

      function checkMatch() {
        if (!selectedLeft || !selectedRight) return;

        const ok = selectedLeft.dataset.id === selectedRight.dataset.id;

        if (ok) {
          selectedLeft.classList.remove("selected");
          selectedRight.classList.remove("selected");

          selectedLeft.classList.add("correct");
          selectedRight.classList.add("correct");

          if (currentMode === "audio") {
            selectedRight.textContent = selectedRight.dataset.en;

            speak(selectedRight.dataset.en);
          }

          solvedPairs++;

          selectedLeft = null;
          selectedRight = null;

          if (solvedPairs === WORDS_PER_ROUND) {
            document.getElementById("message").textContent =
              "Раунд завершён.";

            setTimeout(startRound, 2500);
          }
        } else {
          selectedLeft.classList.add("wrong");
          selectedRight.classList.add("wrong");

          setTimeout(() => {
            selectedLeft.classList.remove("wrong", "selected");

            selectedRight.classList.remove("wrong", "selected");

            selectedLeft = null;
            selectedRight = null;
          }, 800);
        }
      }

      document
        .getElementById("modeBtn")
        .addEventListener("change", renderBoard);
      const modeBtn = document.getElementById("modeBtn");

      modeBtn.addEventListener("click", () => {
        if (currentMode === "audio") {
          currentMode = "visual";
          modeBtn.textContent = "👁";
        } else if (currentMode === "visual") {
          currentMode = "reverse";
          modeBtn.textContent = "⇄";
        } else {
          currentMode = "audio";
          modeBtn.textContent = "👂";
        }

        renderBoard();
      });
      createCycle();
      startRound();
    </script>
