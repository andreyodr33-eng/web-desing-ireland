<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="format-detection" content="telephone=no">
<title>CardVault</title>

<link rel="manifest" href="manifest.json">
 <link rel="icon" href="icon-192.png" type="image/png">
<meta name="theme-color" content="#222222">
 
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background:
    linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
    linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
    linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
  background-size: 40px 40px;
  background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
}

.flip-card {
  width: 320px;
  height: 180px;
  perspective: 1000px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d; 
  -webkit-transform-style: preserve-3d;
  transition: transform 0.8s;
}

@media (hover: hover) and (pointer: fine) {
  .flip-card:hover .flip-card-inner {
    transform: rotateY(180deg);
  }
}

.flip-card-inner.flipped {
  transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backfase-visibility: hidden;
  border-radius: 12px;
  padding: 15px;
  box-sizing: border-box;
  background: #222;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

 .flip-card-front *,
 .flip-card-back * {
      margin: 0;
      padding: 0;
      line-height: 1.85;
}

.flip-card-back {
  transform: rotateY(180deg);
  text-align: left;
  position: relative;
  padding: 15px;
  display: block;
}
.flip-card-back h3 {
   position: absolute;
   top: 15px;
   left: 15px;
   margin: 0;
 }
.flip-card-back .qr-code {
   position: absolute;
   top: 50%;
   left: 50%;
   transform: translate(-50%, -50%);
   margin: 0;
 }
 .flip-card-back p {
   position: absolute;
   bottom: 15px;
   right: 15px;
   margin: 0;
 }

a {
  color: red;
  text-decoration: none;
  margin-top: 6px;
}

.qr-code {
  width: 100px;
  height: 100px;
  max-width: 80%;
  object-fit: contain;
  border-radius: 8px;
  margin: 10px 0;
 }
  /*Адаптация под экран телефона*/
      @media (max-width: 480px) {
      #consultation-form {
      padding: 15px;
      max-width: 90%;
    }
  }
</style>
</head>

<body>

 <div class="flip-card" id="flipCard">
    <div class="flip-card-inner">
    <!-- Передняя сторона -->
    <div class="flip-card-front">
      <h3>GUINNESS</h3>
      <p>PAUL - Loadmaster</p>
      <p>Company STL</p>
      <a href="tel:+353874919018">📞 +353 87 491 9018</a>
  </div>
     <!-- Задняя сторона -->
    <div class="flip-card-back">
     <h3>Revolut</h3>
      <img src="IMG_E1029.JPG" alt="QR Code" class="qr-code">
      <!-- КНОПКА ПОДЕЛИТЬСЯ -->
      <p>
      <a href="javascript:void(0)" onclick="shareCard()">📤 share</a>
      </p>
   
    </div>

  </div>
</div>

<script>
// Переворот на телефоне
const flipCard = document.getElementById('flipCard');
const flipInner = flipCard.querySelector('.flip-card-inner');
 
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

if (isTouchDevice) {
  flipCard.addEventListener('click', () => {
    flipInner.classList.toggle('flipped');
  });
}

// Web Share API
function shareCard() {
  if (navigator.share) {
    navigator.share({
      title: "Andrii - Web Developer",
      text: "Моя цифровая визитка:",
      url: window.location.href
    });
  } else {
    alert("Функция поделиться не поддерживается этим браузером");
  }
}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/vault/service-worker.js")
    .then(() => console.log("Service Worker registered"));
}
</script>

</body>
</html>
